
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FlashCam Revolution</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Filtres de base */
        .f-vintage { filter: sepia(0.5) contrast(1.1); }
        .f-bw { filter: grayscale(1); }
        /* Filtres Premium */
        .f-gold { filter: brightness(1.2) sepia(0.3) saturate(1.8) contrast(1.1); }
        .f-cyber { filter: hue-rotate(290deg) saturate(2.5) contrast(1.2); }
        
        video { object-fit: cover; width: 100%; height: 100%; position: absolute; top:0; left:0; transition: all 0.4s ease; }
        .premium-border { border: 2px solid #facc15; box-shadow: 0 0 15px rgba(250, 204, 21, 0.5); }
        .page { display: none; height: 100%; animation: slideUp 0.3s ease-out; }
        .active-page { display: flex; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
